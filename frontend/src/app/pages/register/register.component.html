<div class="auth-wrap">
  <div class="card shadow-sm p-4 auth-card">
    <h3 class="mb-3">Register</h3>
    <p class="text-muted mb-4">Create your DMS account</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" formControlName="name" />
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email" />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" />
      </div>

      <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>
      <div *ngIf="success" class="alert alert-success py-2">{{ success }}</div>

      <button class="btn btn-success w-100" [disabled]="loading" type="submit">
        {{ loading ? 'Creating...' : 'Create Account' }}
      </button>
    </form>

    <p class="mt-3 mb-0 text-center">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
