<div class="container py-4">
  <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
    <h2 class="mb-0">Documents</h2>
    <a routerLink="/upload" class="btn btn-primary">Upload</a>
  </div>

  <div class="card shadow-sm p-3 mb-3">
    <div class="input-group">
      <input type="text" class="form-control" [(ngModel)]="query" placeholder="Search by filename or tags" />
      <button class="btn btn-outline-primary" (click)="search()">Search</button>
      <button class="btn btn-outline-secondary" (click)="loadDocuments()">Reset</button>
    </div>
  </div>

  <div *ngIf="loading" class="alert alert-info">Loading documents...</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="table-responsive" *ngIf="!loading && !error">
    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>Filename</th>
          <th>Tags</th>
          <th>Uploaded</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let doc of documents">
          <td>{{ doc.originalName }}</td>
          <td>{{ doc.tags.join(', ') || '-' }}</td>
          <td>{{ doc.createdAt | date: 'mediumDate' }}</td>
          <td class="text-end">
            <a [routerLink]="['/documents', doc._id]" class="btn btn-sm btn-outline-secondary me-2">View</a>
            <button class="btn btn-sm btn-outline-danger" (click)="remove(doc._id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
